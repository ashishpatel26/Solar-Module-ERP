services:
  postgres:
    image: postgres:16-alpine
    container_name: solaros-erp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solaros_erp
    ports:
      - "5432:5432"
    volumes:
      - solaros_erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solaros_erp"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  solaros_erp_pgdata:
